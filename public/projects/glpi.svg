<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d8ff"/>
      <stop offset="100%" stop-color="#005f73"/>
    </linearGradient>
    <linearGradient id="glpiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bb673"/>
      <stop offset="100%" stop-color="#155d3b"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d8ff"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#2bb673"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="950" cy="180" r="160" fill="#2bb673" filter="blur(100px)" opacity="0.12" />
  <circle cx="500" cy="240" r="140" fill="#00d8ff" filter="blur(90px)" opacity="0.15" />

  <rect x="50" y="50" width="1100" height="530" rx="24" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <text x="90" y="130" fill="#ffffff" font-size="44" font-family="Segoe UI, system-ui, sans-serif" font-weight="800" letter-spacing="-0.5">
