      <rect x="17" y="20" width="51" height="34" rx="4" fill="none" stroke="#00d8ff" stroke-width="1.5"/>
      <line x1="23" y1="44" x2="35" y2="44" stroke="#00d8ff" stroke-width="1.5"/>
      <circle cx="61" cy="30" r="3" fill="#00d8ff"/>
      <path d="M 50 64 C 50 61, 75 61, 75 64 L 75 74 C 75 77, 50 77, 50 74 Z" fill="#38bdf8" fill-opacity="0.8"/>
      <ellipse cx="62.5" cy="64" rx="12.5" ry="3" fill="#00d8ff"/>
      <text x="42" y="81" fill="#00d8ff" font-size="9" font-family="Segoe UI, sans-serif" font-weight="800">SQLITE</text>
