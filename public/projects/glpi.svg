  </text>

  <g transform="translate(90, 240)">
    <g transform="translate(0, 0)">
      <rect width="230" height="44" rx="12" fill="#082f49" stroke="#00d8ff" stroke-width="1.5"/>
      <circle cx="28" cy="22" r="5" fill="#00d8ff"/>
      <text x="48" y="27" fill="#f1f5f9" font-size="15" font-family="Segoe UI, sans-serif" font-weight="700">React (NewAPP)</text>
    </g>
    <g transform="translate(0, 60)">
      <rect width="230" height="44" rx="12" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>
      <circle cx="28" cy="22" r="5" fill="#38bdf8"/>
      <text x="48" y="27" fill="#f1f5f9" font-size="15" font-family="Segoe UI, sans-serif" font-weight="700">SQLite</text>
    </g>
    <g transform="translate(0, 120)">
      <rect width="230" height="44" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4 2"/>
      <circle cx="28" cy="22" r="5" fill="#818cf8"/>
      <text x="48" y="27" fill="#f1f5f9" font-size="15" font-family="Segoe UI, sans-serif" font-weight="700">JSON REST API Exchange</text>
    </g>
    <g transform="translate(0, 180)">
