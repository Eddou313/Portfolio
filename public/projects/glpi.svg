    <g transform="translate(255, 30)">
      <rect width="85" height="90" rx="14" fill="url(#glpiGrad)" opacity="0.15"/>
      <rect width="85" height="90" rx="14" fill="none" stroke="#2bb673" stroke-width="2"/>
      <path d="M 55 30 A 18 18 0 1 0 55 58 L 55 48 A 8 8 0 1 1 55 40 Z" fill="#2bb673"/>
      <rect x="25" y="55" width="16" height="16" rx="3" fill="#2bb673"/>
      <circle cx="33" cy="63" r="3" fill="#ffffff"/>
      <text x="42.5" y="82" fill="#4ade80" font-size="13" font-family="Segoe UI, sans-serif" font-weight="800" text-anchor="middle">GLPI 11</text>
