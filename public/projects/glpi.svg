      <text x="48" y="27" fill="#f1f5f9" font-size="15" font-family="Segoe UI, sans-serif" font-weight="700">GLPI 11 (ExistingApp)</text>
    </g>
  </g>

  <g transform="translate(480, 230)">
    <path d="M 85 45 Q 170 15, 255 45" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-dasharray="6 4" opacity="0.9"/>
    <path d="M 85 75 Q 170 75, 255 75" fill="none" stroke="url(#lineGrad)" stroke-width="3" opacity="0.4"/>
    <path d="M 85 105 Q 170 135, 255 105" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-dasharray="2 2" opacity="0.9"/>
    
    <text x="170" y="28" fill="#38bdf8" font-size="11" font-family="Segoe UI, sans-serif" font-weight="600" text-anchor="middle">JSON Payload</text>
    <text x="170" y="142" fill="#4ade80" font-size="11" font-family="Segoe UI, sans-serif" font-weight="600" text-anchor="middle">Tickets &amp; Assets Sync</text>

    <g transform="translate(0, 30)">
