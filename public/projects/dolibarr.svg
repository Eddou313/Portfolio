<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a12"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d8ff"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="doliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d8ff"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="980" cy="220" r="190" fill="#22c55e" filter="blur(110px)" opacity="0.1"/>
  <circle cx="550" cy="280" r="170" fill="#00d8ff" filter="blur(100px)" opacity="0.15"/>

  <rect x="50" y="50" width="1100" height="530" rx="24" fill="#ffffff" fill-opacity="0.01" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1.5"/>

  <text x="90" y="130" fill="#ffffff" font-size="44" font-family="Segoe UI, system-ui, sans-serif" font-weight="800" letter-spacing="-0.5">
