    <g transform="translate(295, 30)">
      <rect width="85" height="90" rx="14" fill="url(#doliGrad)" opacity="0.15"/>
      <rect width="85" height="90" rx="14" fill="none" stroke="#22c55e" stroke-width="2"/>
      
      <circle cx="42.5" cy="36" r="10" fill="none" stroke="#22c55e" stroke-width="2"/>
      <path d="M 26 58 C 26 48, 59 48, 59 58 Z" fill="none" stroke="#22c55e" stroke-width="2"/>
      
      <circle cx="62" cy="58" r="9" fill="#22c55e"/>
      <text x="62" y="62" fill="#ffffff" font-size="11" font-family="Segoe UI, sans-serif" font-weight="900" text-anchor="middle">€</text>
      
      <text x="42.5" y="82" fill="#4ade80" font-size="12" font-family="Segoe UI, sans-serif" font-weight="800" text-anchor="middle">DOLIBARR</text>
    </g>
