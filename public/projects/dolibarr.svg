      <rect width="85" height="90" rx="14" fill="none" stroke="#00d8ff" stroke-width="2"/>
      
      <rect x="22" y="45" width="8" height="20" rx="1" fill="#38bdf8"/>
      <rect x="34" y="35" width="8" height="30" rx="1" fill="#00d8ff"/>
      <rect x="46" y="25" width="8" height="40" rx="1" fill="#60a5fa"/>
      <line x1="16" y1="65" x2="68" y2="65" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>
      
      <path d="M 52 74 C 52 72, 72 72, 72 74 L 72 81 C 72 83, 52 83, 52 81 Z" fill="#38bdf8" fill-opacity="0.8"/>
      <ellipse cx="62" cy="74" rx="10" ry="2.5" fill="#00d8ff"/>
      <text x="34" y="81" fill="#00d8ff" font-size="8" font-family="Segoe UI, sans-serif" font-weight="800">SQLITE</text>
