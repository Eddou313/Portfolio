  <g transform="translate(560, 265)">
    <path d="M 85 45 Q 190 10, 295 45" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-dasharray="6 4" opacity="0.9"/>
    <path d="M 85 75 Q 190 75, 295 75" fill="none" stroke="url(#lineGrad)" stroke-width="3" opacity="0.4"/>
    <path d="M 85 105 Q 190 140, 295 105" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-dasharray="2 2" opacity="0.9"/>
    
    <text x="190" y="22" fill="#38bdf8" font-size="12" font-family="Segoe UI, sans-serif" font-weight="600" text-anchor="middle">Multi-installment Payments</text>
    <text x="190" y="148" fill="#4ade80" font-size="12" font-family="Segoe UI, sans-serif" font-weight="600" text-anchor="middle">HRM Data &amp; Salaries Sync</text>

