      <circle cx="28" cy="22" r="5" fill="#00d8ff"/>
      <text x="48" y="27" fill="#f1f5f9" font-size="14" font-family="Segoe UI, sans-serif" font-weight="700">React Client (NewAPP)</text>
    </g>
    <g transform="translate(0, 60)">
      <rect width="240" height="44" rx="12" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
      <circle cx="28" cy="22" r="5" fill="#38bdf8"/>
      <text x="48" y="27" fill="#f1f5f9" font-size="14" font-family="Segoe UI, sans-serif" font-weight="700">SQLite</text>
    </g>
    <g transform="translate(0, 120)">
      <rect width="240" height="44" rx="12" fill="#172554" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4 2"/>
